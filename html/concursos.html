<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/concursos.css">
    <title>AprovaJá – Concursos</title>
</head>
<body>

    <div class="navbar-wrapper">
        <nav class="navbar">
            <div class="nav-left">
                <div class="logo">
                    <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"></path><circle cx="12" cy="8" r="6"></circle></svg></span>
                    <span class="brand">AprovaJá</span>
                </div>
                <ul class="menu" id="menu">
                    <li><a href="../index.html">🏠 Dashboard</a></li>
                    <li class="active"><a href="#">📄 Concursos</a></li>
                    <li><a href="convocacoes.html">🔔 Convocações</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <span class="user" id="nav-user-name">Olá, …</span>
                <button class="icon-btn" onclick="window.location.href='perfil.html'">👤</button>
                <button type="button" class="icon-btn logout" title="Sair da conta" aria-label="Sair da conta"><span class="logout-text">Sair</span><span class="logout-icons" aria-hidden="true">👔🚪</span></button>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </div>

    <div class="apresentacao">
        <h1>Explore Concursos</h1>
        <p>Encontre oportunidades na sua área de interesse</p>
    </div>

    <main class="concursos-page">

        <!-- Filtros -->
        <div class="filtros">
            <select id="filtro-uf" aria-label="Estado (UF)" title="Lista regional da API pública">
                <option value="ac">AC</option>
                <option value="al">AL</option>
                <option value="ap">AP</option>
                <option value="am">AM</option>
                <option value="ba">BA</option>
                <option value="ce">CE</option>
                <option value="df">DF</option>
                <option value="es">ES</option>
                <option value="go">GO</option>
                <option value="ma">MA</option>
                <option value="mt">MT</option>
                <option value="ms">MS</option>
                <option value="mg">MG</option>
                <option value="pa">PA</option>
                <option value="pb">PB</option>
                <option value="pr">PR</option>
                <option value="pe">PE</option>
                <option value="pi">PI</option>
                <option value="rj">RJ</option>
                <option value="rn">RN</option>
                <option value="rs">RS</option>
                <option value="ro">RO</option>
                <option value="rr">RR</option>
                <option value="sc">SC</option>
                <option value="sp" selected>SP</option>
                <option value="se">SE</option>
                <option value="to">TO</option>
            </select>
            <div class="filtro-busca">
                <span class="filtro-icon">🔍</span>
                <input type="search" id="filtro-busca" placeholder="Buscar por cargo ou órgão..." autocomplete="off">
            </div>
            <select id="filtro-area" aria-label="Filtrar por área">
                <option value="">Todas as áreas</option>
            </select>
            <select id="filtro-status" aria-label="Filtrar por status">
                <option value="">Todos os status</option>
                <option value="aberto">Inscrições Abertas</option>
                <option value="previsto">Previstos</option>
                <option value="encerrado">Encerrado</option>
            </select>
        </div>

        <!-- Lista: dados curados (data/concursos-curados.json) + API pública -->
        <div class="concursos-lista" id="concursos-lista" aria-live="polite"></div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/api.js"></script>
    <script>
        const hamburger = document.getElementById('hamburger');
        const menu = document.getElementById('menu');
        hamburger.addEventListener('click', () => {
            menu.classList.toggle('open');
            hamburger.classList.toggle('active');
        });
        document.addEventListener('DOMContentLoaded', async function () {
            await AprovaJaAuth.init();
            await AprovaJaAuth.boot();
            await AprovaJaApi.initConcursosPage();
        });
    </script>
</body>
</html>
