<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>AprovaJá – Login</title>
</head>
<body>

    <div class="login-page">

        <div class="login-header">
            <div class="login-logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"/>
                    <circle cx="12" cy="8" r="6"/>
                </svg>
            </div>
            <h1>AprovaJá</h1>
            <p>Acompanhe seus concursos em um só lugar</p>
        </div>

        <div class="login-card">
            <h2>Entrar na sua conta</h2>
            <p class="card-subtitle">Digite suas credenciais para acessar</p>

            <div class="field">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉️</span>
                    <input type="email" id="email" placeholder="seu@email.com">
                </div>
            </div>

            <div class="field">
                <label for="senha">Senha</label>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="senha" placeholder="••••••••">
                </div>
            </div>

            <button class="btn-entrar">Entrar</button>

            <p class="cadastro">Não tem uma conta? <a href="#">Cadastre-se</a></p>
        </div>

        <p class="hint">Use qualquer email e senha para fazer login</p>

    </div>

    <script>
        document.querySelector('.btn-entrar').addEventListener('click', () => {
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
